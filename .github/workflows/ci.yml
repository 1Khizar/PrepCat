name: PrepBuddy Code Validation (CI)

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  validate-backend:
    name: Backend validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        # We also install pytest and httpx so we can run tests later
        pip install -r requirements.txt pytest httpx

    - name: Validate Backend Syntax
      run: |
        # This will fail the pipeline if there are any syntax errors in main.py
        python -m py_compile main.py
        # Future: When you write unit tests, you will uncomment the line below:
        # pytest tests/

  validate-frontend:
    name: Frontend validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install Frontend Dependencies
      run: npm ci || npm install

    - name: Run Next.js Build (Linting & Type Checking)
      # Building Next.js automatically runs ESLint and TypeScript code checks
      run: npm run build
      env:
        # We set a placeholder env variable just in case the build requires it
        NEXT_PUBLIC_API_URL: http://localhost:8000
